name: Simple V2Ray Config Saver

on:
  workflow_dispatch:
    inputs:
      server_address:
        description: 'Server IP or Domain'
        required: true
      port:
        description: 'Port'
        required: true
      uuid:
        description: 'UUID'
        required: true

jobs:
  save-config:
    runs-on: ubuntu-latest
    steps:
      - name: Create config file
        run: |
          cat > my-v2ray-config.txt << "EOF"
          # V2Ray Configuration
          # Generated by GitHub Actions
          
          Server: ${{ github.event.inputs.server_address }}
          Port: ${{ github.event.inputs.port }}
          UUID: ${{ github.event.inputs.uuid }}
          Protocol: vmess
          Network: ws
          Security: tls
          Path: /v2ray
          
          # VMess Link:
          vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"MyConfig\",\"add\":\"${{ github.event.inputs.server_address }}\",\"port\":\"${{ github.event.inputs.port }}\",\"id\":\"${{ github.event.inputs.uuid }}\",\"aid\":\"0\",\"net\":\"ws\",\"path\":\"/v2ray\",\"tls\":\"tls\"}" | base64 -w 0)
          EOF
          
          echo "Config saved to my-v2ray-config.txt"
          cat my-v2ray-config.txt
      
      - name: Upload config file
        uses: actions/upload-artifact@v4
        with:
          name: v2ray-config
          path: my-v2ray-config.txt
          retention-days: 30
