name: YouTube Downloader with Cookie Support

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
      use_cookies:
        description: 'Use cookies (recommended)'
        required: false
        default: true
        type: boolean

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install --upgrade yt-dlp
      
      - name: Setup cookies
        if: ${{ github.event.inputs.use_cookies == 'true' }}
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
            echo "COOKIE_ARGS=--cookies cookies.txt" >> $GITHUB_ENV
          else
            echo "COOKIE_ARGS=" >> $GITHUB_ENV
            echo "⚠️ No cookies found in secrets, trying without..."
          fi
      
      - name: Download video
        run: |
          yt-dlp ${{ env.COOKIE_ARGS }} \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --extractor-args "youtube:player_client=web,mweb,android" \
            --sleep-interval 5 \
            --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]" \
            --merge-output-format mp4 \
            -o "%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"
      
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: "*.mp4"
          retention-days: 7
